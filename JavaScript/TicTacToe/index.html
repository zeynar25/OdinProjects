<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicTacToe Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="container">
      <h1>Tic Tac Toe</h1>
      <div id="menu">
        <form action="">
          <input
            type="text"
            id="playerName"
            name="playerName"
            placeholder="Enter your name"
            required
          />

          <div id="symbolSelection">
            <label>Play as:</label>

            <div id="symbols">
              <input
                type="radio"
                name="symbol"
                id="symbolX"
                value="X"
                class="symbol-radio"
              />
              <label for="symbolX" class="symbol">X</label>

              <input
                type="radio"
                name="symbol"
                id="symbolO"
                value="O"
                class="symbol-radio"
              />
              <label for="symbolO" class="symbol">O</label>
            </div>
          </div>
          <button type="submit" id="startBtn">Start Game</button>
        </form>
      </div>
      <div id="gameBoard"></div>
      <div id="gameMessage"></div>
      <button id="restartBtn">Play Again</button>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
